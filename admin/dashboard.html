<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | JVS Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0A2647',
                        secondary: '#144272',
                        accent: '#205295',
                        light: '#2C74B3',
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-slate-50 min-h-screen font-sans">
    <!-- Auth Guard -->
    <script>
        if (sessionStorage.getItem('jvs_admin_auth') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>

    <!-- Navigation -->
    <nav class="bg-primary text-white h-20 flex items-center shadow-lg">
        <div class="max-w-7xl mx-auto px-4 w-full flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <img src="../assets/images/logo.png" alt="JVS Academy" class="h-12">
                <span class="font-bold text-xl">Admin Dashboard</span>
            </div>
            <div class="flex items-center space-x-6">
                <a href="../index.html" target="_blank" class="hover:text-light flex items-center space-x-2">
                    <i data-lucide="external-link" class="w-4 h-4"></i>
                    <span>Preview Site</span>
                </a>
                <button onclick="logout()"
                    class="bg-red-500/20 hover:bg-red-500 px-4 py-2 rounded-lg transition-all text-sm font-bold border border-red-500/50">
                    Logout
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-12">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <!-- Sidebar -->
            <div class="lg:col-span-1 space-y-2">
                <button onclick="switchTab('general')"
                    class="tab-btn w-full text-left px-6 py-4 rounded-xl flex items-center space-x-3 transition-all font-bold group bg-primary text-white"
                    data-tab="general">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                    <span>General Settings</span>
                </button>
                <button onclick="switchTab('directors')"
                    class="tab-btn w-full text-left px-6 py-4 rounded-xl flex items-center space-x-3 transition-all font-bold group hover:bg-white hover:shadow-md text-slate-600"
                    data-tab="directors">
                    <i data-lucide="users" class="w-5 h-5"></i>
                    <span>Manage Directors</span>
                </button>
                <button onclick="switchTab('courses')"
                    class="tab-btn w-full text-left px-6 py-4 rounded-xl flex items-center space-x-3 transition-all font-bold group hover:bg-white hover:shadow-md text-slate-600"
                    data-tab="courses">
                    <i data-lucide="book-open" class="w-5 h-5"></i>
                    <span>Course Pricing</span>
                </button>
            </div>

            <!-- Content Area -->
            <div class="lg:col-span-3">
                <div id="tab-general" class="tab-content bg-white rounded-3xl shadow-xl p-8 md:p-12">
                    <h2 class="text-3xl font-bold text-primary mb-8 border-b pb-4">General Website Info</h2>
                    <form id="general-form" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <!-- Site Info Fields -->
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-slate-400">Phone Display</label>
                            <input type="text" name="phone" id="conf-phone"
                                class="w-full px-5 py-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-primary transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-slate-400">Phone (Raw Numbers)</label>
                            <input type="text" name="phoneRaw" id="conf-phoneRaw"
                                class="w-full px-5 py-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-primary transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-slate-400">Email Address</label>
                            <input type="email" name="email" id="conf-email"
                                class="w-full px-5 py-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-primary transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-slate-400">CIN Number</label>
                            <input type="text" name="cin" id="conf-cin"
                                class="w-full px-5 py-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-primary transition-all">
                        </div>
                        <div class="md:col-span-2 space-y-2">
                            <label class="text-sm font-bold text-slate-400">Office Address</label>
                            <textarea name="address" id="conf-address" rows="2"
                                class="w-full px-5 py-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-primary transition-all"></textarea>
                        </div>
                        <div class="md:col-span-2 flex justify-end">
                            <button type="submit"
                                class="bg-primary text-white px-10 py-4 rounded-xl font-bold shadow-lg shadow-primary/20 hover:scale-105 active:scale-95 transition-all">Save
                                Changes</button>
                        </div>
                    </form>
                </div>

                <div id="tab-directors" class="tab-content bg-white rounded-3xl shadow-xl p-8 md:p-12 hidden">
                    <div class="flex justify-between items-center mb-8 border-b pb-4">
                        <h2 class="text-3xl font-bold text-primary">Management Team</h2>
                        <button onclick="addNewDirector()"
                            class="bg-accent text-white px-6 py-3 rounded-xl font-bold text-sm shadow-lg shadow-accent/20 flex items-center space-x-2 hover:scale-105 transition-all">
                            <i data-lucide="plus" class="w-4 h-4"></i>
                            <span>Add Director</span>
                        </button>
                    </div>
                    <div id="directors-list" class="space-y-6">
                        <!-- Dynamic Director List -->
                    </div>
                </div>

                <div id="tab-courses" class="tab-content bg-white rounded-3xl shadow-xl p-8 md:p-12 hidden">
                    <h2 class="text-3xl font-bold text-primary mb-8 border-b pb-4">Course Pricing & Details</h2>
                    <div id="courses-list" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Dynamic Courses List -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Director Edit Modal -->
    <div id="edit-modal" class="fixed inset-0 bg-primary/95 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white max-w-2xl w-full rounded-3xl p-10 max-h-[90vh] overflow-y-auto">
            <h3 id="modal-title" class="text-2xl font-bold text-primary mb-6">Edit Director</h3>
            <form id="edit-director-form" class="space-y-6">
                <input type="hidden" id="edit-id">
                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-400">Full Name</label>
                    <input type="text" id="edit-name"
                        class="w-full px-5 py-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-primary transition-all"
                        required>
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-400">Job Title / Role</label>
                    <input type="text" id="edit-role"
                        class="w-full px-5 py-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-primary transition-all"
                        required>
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-400">Biography</label>
                    <textarea id="edit-bio" rows="6"
                        class="w-full px-5 py-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-primary transition-all"
                        required></textarea>
                </div>
                <div class="flex justify-end space-x-4">
                    <button type="button" onclick="closeEditModal()"
                        class="px-8 py-4 font-bold text-slate-400 hover:text-red-500">Cancel</button>
                    <button type="submit" class="bg-primary text-white px-10 py-4 rounded-xl font-bold">Save
                        Director</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/admin.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
