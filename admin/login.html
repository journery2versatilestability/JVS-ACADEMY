<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | JVS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0f172a',
                        secondary: '#1e293b',
                        accent: '#6366f1',
                        light: '#818cf8',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-primary min-h-screen flex items-center justify-center px-4">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-10">
        <div class="text-center mb-10">
            <img src="../assets/images/logo.png" alt="JVS" class="h-16 mx-auto mb-4">
            <h1 class="text-2xl font-bold text-primary">Admin Access</h1>
            <p class="text-slate-500">Enter your credentials to manage JVS</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div class="space-y-2">
                <label class="text-sm font-bold text-slate-500 uppercase tracking-widest">Email Address</label>
                <input type="email" id="email" required placeholder="jvs@gmail.com"
                    class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary outline-none transition-all">
            </div>
            <div class="space-y-2">
                <label class="text-sm font-bold text-slate-500 uppercase tracking-widest">Password</label>
                <input type="password" id="password" required placeholder="••••••••"
                    class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary outline-none transition-all">
            </div>
            <div id="error-msg" class="text-red-500 text-sm font-bold hidden text-center">Invalid email or password
            </div>
            <button type="submit"
                class="w-full py-4 bg-primary text-white rounded-xl font-bold hover:bg-accent transition-all shadow-lg shadow-primary/20 cursor-pointer">
                Sign In
            </button>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (email === 'jvs@gmail.com' && password === 'jvs@123') {
                sessionStorage.setItem('jvs_admin_auth', 'true');
                window.location.href = 'dashboard.html';
            } else {
                const errorMsg = document.getElementById('error-msg');
                errorMsg.classList.remove('hidden');
                setTimeout(() => errorMsg.classList.add('hidden'), 3000);
            }
        });
    </script>
</body>

</html>
